<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Glauciani Cardoso</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="page-bg">
        <div class="container">

            <header class="nav">
                <div class="logo">
                    <a href="index.html">
                        <img src="img/logo.webp" alt="Glauciani Cardoso Logo">
                    </a>
                </div>
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="projects.html">Projetos</a>
                    <a href="info.html">Info</a>
                    <a href="contact.html" class="active">Contato</a>
                </nav>
            </header>

            <main>
                <!-- HERO / STORYTELLING -->
                <section class="hero">
                    <div class="quote-box">
                        <div class="corner top-left"></div>
                        <div class="corner bottom-right"></div>
                        <p>
                            <span>Vamos construir algo juntos.</span><br>
                            Estou em busca de desafios e experiências reais para continuar evoluindo.
                        </p>
                    </div>
                </section>

                <!-- CONTACT SECTION -->
                <section class="contact">
                    <div class="section-header">
                        <span class="label">CONTATO</span>
                        <h2 class="sectionn-title">Fale comigo</h2>
                    </div>

                    <div class="contact-grid">
                        <!-- FORM -->
                        <form class="contact-form" action="#" method="POST">
                            <div class="form-group">
                                <label for="name" class="sr-only">Seu nome</label>
                                <input type="text" id="name" name="name" placeholder="Seu nome" required>
                            </div>

                            <div class="form-group">
                                <label for="email" class="sr-only">Seu e-mail</label>
                                <input type="email" id="email" name="email" placeholder="Seu e-mail" required>
                            </div>

                            <div class="form-group">
                                <label for="message" class="sr-only">Sua mensagem</label>
                                <textarea id="message" name="message" rows="5" placeholder="Sua mensagem"
                                    required></textarea>
                            </div>

                            <button type="submit" class="btn-primary">Enviar mensagem</button>
                        </form>

                        <!-- INFO (Agora clicáveis) -->
                        <div class="contact-info">
                            <a href="https://github.com/SEU_USER" target="_blank" class="info-card"
                                aria-label="Acesse meu GitHub">
                                <i class="fab fa-github" aria-hidden="true"></i>
                                <p>GitHub</p>
                            </a>

                            <a href="https://linkedin.com/in/SEU_USER" target="_blank" class="info-card"
                                aria-label="Acesse meu LinkedIn">
                                <i class="fab fa-linkedin" aria-hidden="true"></i>
                                <p>LinkedIn</p>
                            </a>

                            <a href="mailto:seuemail@exemplo.com" class="info-card" aria-label="Envie um e-mail">
                                <i class="fas fa-envelope" aria-hidden="true"></i>
                                <p>Email</p>
                            </a>

                            <a href="https://instagram.com/SEU_USER" target="_blank" class="info-card"
                                aria-label="Siga-me no Instagram">
                                <i class="fab fa-instagram" aria-hidden="true"></i>
                                <p>Instagram</p>
                            </a>
                        </div>
                    </div>
                </section>
            </main>


        </div>
    </div>
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Glauciani Cardoso. Desenvolvido com
                <i class="fas fa-heart heart-icon" aria-hidden="true"></i> e
                <i class="fas fa-coffee coffee-icon" aria-hidden="true"></i>
            </p>
            <div class="socials">
                <a href="#" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="#" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>
</body>

</html>
